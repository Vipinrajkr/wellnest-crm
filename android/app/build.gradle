// android/app/build.gradle

apply plugin: 'com.android.application'

android {
    namespace "com.wellnest.crm"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.wellnest.crm"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Bump both on every release build (see BUILD.md §"Versioning").
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    // Release signing is read from android/keystore.properties, which is
    // NOT committed to version control (see .gitignore + BUILD.md for the
    // exact `keytool -genkeypair` command to create it locally). Falls
    // back to no signing config if the properties file is absent, so a
    // fresh checkout can still build a debug APK without it.
    def keystorePropertiesFile = rootProject.file("keystore.properties")
    def keystoreProperties = new Properties()
    if (keystorePropertiesFile.exists()) {
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        debug {
            // Debuggable, auto-signed with the Android debug keystore —
            // used for `npm run build:debug` / sideloading during testing.
        }
        release {
            // R8 code + resource shrinking for the production build — see
            // BUILD.md's release checklist for the required "install and
            // smoke-test the signed release APK" step this now demands
            // (minification is the one build-config change that can only
            // be validated by actually running the shrunk APK, not by a
            // source-level review, since it can strip something only
            // reached via reflection at runtime).
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
        // Required by @capacitor/background-runner's native Android
        // engine — see https://capacitorjs.com/docs/apis/background-runner#android
        dirs '../../node_modules/@capacitor/background-runner/android/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$coordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:1.0.1"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:4.13.2"
    androidTestImplementation "androidx.test.ext:junit:1.2.1"
    androidTestImplementation "androidx.test.espresso:espresso-core:3.6.1"
    implementation project(':capacitor-cordova-android-plugins')
}

// Regenerated by `npx cap sync android` — wires in every Capacitor plugin
// listed in package.json (Local Notifications, Splash Screen, Background
// Runner). Safe to re-run; do not hand-edit the generated file itself.
apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch (Exception e) {
    logger.info("google-services.json not found — skipping Google Services plugin (not used by Wellnest; no Firebase/push notifications).")
}
